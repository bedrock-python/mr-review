name: Claude Agent Teams Research

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to analyze"
        required: true
        type: number

permissions:
  issues: write
  contents: read
  id-token: write

jobs:
  multi-agent-research:
    runs-on: ubuntu-latest
    # Trigger only for issues with 'agent-teams' label or manual dispatch
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent-teams')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get issue details
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi

          echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

          ISSUE_DATA=$(gh issue view $ISSUE_NUMBER --json title,body,labels)
          echo "title=$(echo "$ISSUE_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_DATA" | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache Claude Code installation
      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: |
            ~/.claude
            ~/.cache/claude
          key: ${{ runner.os }}-claude-${{ hashFiles('.github/workflows/claude-agent-teams-research.yml') }}
          restore-keys: |
            ${{ runner.os }}-claude-

      - name: Multi-Agent Research with Claude
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ steps.issue.outputs.number }}
            TITLE: ${{ steps.issue.outputs.title }}

            BODY:
            ${{ steps.issue.outputs.body }}

            **AGENT TEAMS MODE: Comprehensive feature research**

            This is a feature request requiring deep analysis. Spawn specialized agents:

            **Agent 1 - Technical Feasibility**:
            - Analyze codebase architecture (check .claude/rules/)
            - Identify integration points
            - Assess compatibility with existing patterns
            - Estimate implementation complexity
            - List technical dependencies

            **Agent 2 - Design & Architecture**:
            - Propose implementation approach
            - Design patterns to use (Onion/FSD compliant)
            - API design (if applicable)
            - Database schema changes (if needed)
            - Testing strategy

            **Agent 3 - Risk Analysis & Alternatives**:
            - Identify potential risks and pitfalls
            - Breaking changes impact
            - Performance implications
            - Alternative approaches
            - Trade-offs analysis

            **Team Lead - Synthesis**:
            - Collect findings from all agents
            - Create unified implementation plan
            - Prioritize recommendations
            - Estimate effort (story points)
            - Post comprehensive analysis as issue comment

            **Output Format** (post as comment):
            ```markdown
            ## 🤖 Multi-Agent Analysis Results

            ### Executive Summary
            [High-level recommendation: Approve/Reject/Modify with rationale]

            ### Technical Feasibility (Agent 1)
            - **Integration Points**: [list]
            - **Complexity**: [Low/Medium/High]
            - **Dependencies**: [list]

            ### Proposed Design (Agent 2)
            - **Architecture**: [approach]
            - **Patterns**: [list]
            - **API Changes**: [if any]

            ### Risk Analysis (Agent 3)
            - **Risks**: [list with severity]
            - **Alternatives**: [list]
            - **Recommendation**: [which approach and why]

            ### Implementation Plan
            1. [Step 1]
            2. [Step 2]
            ...

            ### Effort Estimate
            - Story Points: [number]
            - Timeline: [estimate]

            ---
            🤖 Generated by Claude Agent Teams
            ```

            **Tools**:
            - Use `./scripts/add-comment.sh` to post analysis
            - Use `gh issue` commands to read related issues
            - Read codebase extensively (this is read-heavy task, perfect for agent teams)

          claude_args: |
            --model opus
            --allowedTools "Bash(./scripts/add-comment.sh:*),Bash(./scripts/gh.sh:*),Bash(gh issue:*)"
