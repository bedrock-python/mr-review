name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      api-released: ${{ steps.release.outputs['services/mr-review--release_created'] }}
      api-version: ${{ steps.release.outputs['services/mr-review--major'] }}.${{ steps.release.outputs['services/mr-review--minor'] }}.${{ steps.release.outputs['services/mr-review--patch'] }}
      web-released: ${{ steps.release.outputs['services/web-app--release_created'] }}
      web-version: ${{ steps.release.outputs['services/web-app--major'] }}.${{ steps.release.outputs['services/web-app--minor'] }}.${{ steps.release.outputs['services/web-app--patch'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-api:
    needs: release-please
    if: needs.release-please.outputs.api-released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: services/mr-review
          file: services/mr-review/Dockerfile.api
          target: production
          push: true
          tags: |
            ghcr.io/bedrock-python/mr-review/api:${{ needs.release-please.outputs.api-version }}
            ghcr.io/bedrock-python/mr-review/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  publish-web:
    needs: release-please
    if: needs.release-please.outputs.web-released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web-app image
        uses: docker/build-push-action@v6
        with:
          context: services/web-app
          file: services/web-app/Dockerfile.app
          target: production
          push: true
          tags: |
            ghcr.io/bedrock-python/mr-review/web-app:${{ needs.release-please.outputs.web-version }}
            ghcr.io/bedrock-python/mr-review/web-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  publish-all-in-one:
    needs: release-please
    if: needs.release-please.outputs.api-released == 'true' || needs.release-please.outputs.web-released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve all-in-one version
        id: version
        run: |
          if [ -n "${{ needs.release-please.outputs.api-version }}" ]; then
            echo "tag=${{ needs.release-please.outputs.api-version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.release-please.outputs.web-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/all-in-one/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/bedrock-python/mr-review/all-in-one:${{ steps.version.outputs.tag }}
            ghcr.io/bedrock-python/mr-review/all-in-one:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
