name: Claude Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache Claude Code installation
      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: |
            ~/.claude
            ~/.cache/claude
          key: ${{ runner.os }}-claude-${{ hashFiles('.github/workflows/claude-triage.yml') }}
          restore-keys: |
            ${{ runner.os }}-claude-

      - name: Triage issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Triage issue #${{ github.event.issue.number }}: "${{ github.event.issue.title }}"

            Apply labels: type (bug/feature/enhancement), priority (high/medium/low), area (backend/frontend/vcs/ai/infra).
            Check for duplicates. Add comment if info missing.

            Body: ${{ github.event.issue.body }}
