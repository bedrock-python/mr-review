name: Claude Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Triage issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A new issue has been opened: #${{ github.event.issue.number }}

            Title: ${{ github.event.issue.title }}
            Author: ${{ github.event.issue.user.login }}
            Body:
            ${{ github.event.issue.body }}

            As the triage specialist agent:
            1. Read the issue carefully
            2. Apply appropriate labels (type, priority, area)
            3. Check for duplicates by searching existing issues
            4. If information is missing, comment asking for clarification
            5. Link related issues if found

            Use the triage agent guidelines from .claude/agents/triage.md
          agent: triage
