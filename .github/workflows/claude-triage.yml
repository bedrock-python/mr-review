name: Claude Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache Claude Code installation
      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: |
            ~/.claude
            ~/.cache/claude
          key: ${{ runner.os }}-claude-${{ hashFiles('.github/workflows/claude-triage.yml') }}
          restore-keys: |
            ${{ runner.os }}-claude-

      - name: Triage issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}
            AUTHOR: ${{ github.event.issue.user.login }}

            Analyze this new issue and:
            1. Determine type: bug, feature, enhancement, or documentation
            2. Assess priority: priority:high, priority:medium, priority:low
            3. Identify area: area:backend, area:frontend, area:vcs, area:ai, area:infra, area:docs
            4. Check for duplicates using ./scripts/gh.sh search issues "keywords"

            Use ./scripts/gh.sh to interact with GitHub:
            - `./scripts/gh.sh label list` to see available labels
            - `./scripts/gh.sh search issues "query"` to find similar issues

            Add labels using:
            `./scripts/edit-issue-labels.sh --add-label "label1" --add-label "label2"`

          claude_args: |
            --allowedTools "Bash(./scripts/gh.sh:*),Bash(./scripts/edit-issue-labels.sh:*)"
