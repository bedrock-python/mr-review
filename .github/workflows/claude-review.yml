name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master
      - develop

permissions:
  pull-requests: write
  contents: read
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip auto-generated PRs (release-please, dependabot)
    if: |
      !startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      # Cache Claude Code installation
      - name: Cache Claude Code
        uses: actions/cache@v4
        with:
          path: |
            ~/.claude
            ~/.cache/claude
          key: ${{ runner.os }}-claude-${{ hashFiles('.github/workflows/claude-review.yml') }}
          restore-keys: |
            ${{ runner.os }}-claude-

      - name: Determine review agent
        id: agent
        run: |
          # Check which files were changed to select appropriate reviewer
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          if echo "$CHANGED_FILES" | grep -qE '^(services/|libs/python/)'; then
            echo "agent=backend-reviewer" >> $GITHUB_OUTPUT
          elif echo "$CHANGED_FILES" | grep -qE '^(frontend/|apps/)'; then
            echo "agent=frontend-qa-engineer" >> $GITHUB_OUTPUT
          else
            echo "agent=backend-reviewer" >> $GITHUB_OUTPUT
          fi

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request as ${{ steps.agent.outputs.agent }}.

            Focus areas:
            1. Architecture violations (check .claude/rules/ for standards)
               - Backend: Onion Architecture, no ORM in domain/use_cases
               - Frontend: FSD architecture, layer dependencies
            2. Naming conventions (repositories, use cases, components)
            3. Type safety (no `any` in TS, type hints in Python)
            4. Test coverage
            5. Security vulnerabilities
            6. Performance concerns
            7. Commit message style (conventional commits)
            8. Branch naming (feat/fix/chore/...)

            **IMPORTANT**:
            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for code-specific issues
            - Use `gh pr comment` for summary and general feedback
            - Post only GitHub comments, not text responses
            - Review guidelines are in .claude/rules/

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr:*),Bash(git:*),Bash(./scripts/git-push.sh:*)"
