sonar.projectKey=web-app
sonar.projectName=web-app
sonar.sourceEncoding=UTF-8
sonar.sources=./src
sonar.tests=./src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.stories.tsx
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.stories.tsx,\
  src/main.tsx,\
  src/vite-env.d.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.qualitygate.wait=true
