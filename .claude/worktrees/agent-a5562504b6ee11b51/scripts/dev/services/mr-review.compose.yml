x-mr-review-base: &mr-review-base
  networks:
    - mr-review-network
  restart: on-failure:5
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "1.0"

services:
  mr-review-api:
    <<: *mr-review-base
    image: mr-review-api:local
    build:
      context: ../../services/mr-review
      dockerfile: Dockerfile.api
      target: production
    container_name: mr-review-api
    profiles: ["mr-review", "all"]
    ports:
      - "8000:8000"
    environment:
      MR_REVIEW_DATA_DIR: /data
      MR_REVIEW_HOST: "0.0.0.0"
      MR_REVIEW_PORT: "8000"
      MR_REVIEW_CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
    volumes:
      - mr-review-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  mr-review-network:
    external: true
    name: mr-review-network

volumes:
  mr-review-data:
